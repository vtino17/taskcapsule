name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - run: go test ./... -timeout 15m

  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - run: go test -race ./... -timeout 20m

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - run: go build ./...

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - run: go test -tags=integration ./test/integration/... -timeout 20m

  integration-race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - run: go test -race -tags=integration ./test/integration/... -timeout 25m

  release-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Run release packaging dry-run
        run: |
          chmod +x scripts/build-release-artifacts.sh
          VERSION=0.0.0-dry-run COMMIT=DRY-RUN BUILD_DATE=$(date -u +%Y-%m-%d) \
            ./scripts/build-release-artifacts.sh ./dist
      - name: Verify archives
        run: |
          ls -la dist/
          for f in dist/*.tar.gz; do
            tar tzf "$f" | grep -q "LICENSE" && echo "✓ $f contains LICENSE" || echo "✗ $f missing LICENSE"
            tar tzf "$f" | grep -q "taskcapsule" && echo "✓ $f contains binary" || echo "✗ $f missing binary"
          done
          for f in dist/*.zip; do
            unzip -l "$f" | grep -q "LICENSE" && echo "✓ $f contains LICENSE" || echo "✗ $f missing LICENSE"
          done
          test -f dist/checksums.txt && echo "✓ checksums.txt present" || echo "✗ checksums.txt missing"
      - uses: actions/upload-artifact@v4
        with:
          name: release-dry-run
          path: dist/*
