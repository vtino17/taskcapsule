name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Build artifacts without publishing (true/false)'
        required: true
        default: 'true'

permissions:
  contents: read

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Validate tag format
        run: |
          VERSION="${{ github.ref_name }}"
          echo "VERSION=$VERSION"
          [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "Invalid tag format: $VERSION"; exit 1; }
          test -f LICENSE || { echo "LICENSE file missing"; exit 1; }
          test -f README.md || { echo "README.md file missing"; exit 1; }

      - name: Format check
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -timeout 15m

      - name: Race test
        run: go test -race ./... -timeout 20m
        continue-on-error: true

      - name: Integration test
        run: go test -tags=integration ./test/integration/... -timeout 20m

      - name: Build all
        run: go build ./...

      - name: Verify module
        run: go mod verify

  build:
    needs: [validate-and-test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Build and package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build \
            -trimpath \
            -ldflags "-s -w -X github.com/vtino17/taskcapsule/internal/version.Version=${VERSION} \
                      -X github.com/vtino17/taskcapsule/internal/version.Commit=$GITHUB_SHA \
                      -X github.com/vtino17/taskcapsule/internal/version.BuildDate=$(date -u +%Y-%m-%d)" \
            -o taskcapsule${{ matrix.ext }} ./cmd/taskcapsule

          artifact="taskcapsule_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "$artifact"
          cp taskcapsule${{ matrix.ext }} LICENSE README.md "$artifact/"

          if [ "${{ matrix.goos }}" = "windows" ]; then
            cd "$artifact" && zip -q "../${artifact}.zip" taskcapsule.exe LICENSE README.md
          else
            tar czf "${artifact}.tar.gz" -C "$artifact" . --transform 's,^\./,taskcapsule/,'
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}_${{ matrix.goarch }}
          path: taskcapsule_*.tar.gz taskcapsule_*.zip

  release:
    needs: [validate-and-test, build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz *.zip > checksums.txt
          ls -la

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            artifacts/*.tar.gz artifacts/*.zip artifacts/checksums.txt \
            --repo "$GITHUB_REPOSITORY" \
            --title "TaskCapsule $GITHUB_REF_NAME" \
            --notes "See the [CHANGELOG](https://github.com/$GITHUB_REPOSITORY/blob/main/CHANGELOG.md) for details." \
            --verify-tag \
            --latest

  release-dry-run:
    needs: [validate-and-test]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry-run == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Build and package
        run: |
          VERSION="0.0.0-dry-run"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build \
            -trimpath \
            -ldflags "-s -w -X github.com/vtino17/taskcapsule/internal/version.Version=${VERSION} \
                      -X github.com/vtino17/taskcapsule/internal/version.Commit=DRY-RUN \
                      -X github.com/vtino17/taskcapsule/internal/version.BuildDate=$(date -u +%Y-%m-%d)" \
            -o taskcapsule${{ matrix.ext }} ./cmd/taskcapsule

          artifact="taskcapsule_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "$artifact"
          cp taskcapsule${{ matrix.ext }} LICENSE README.md "$artifact/"

          if [ "${{ matrix.goos }}" = "windows" ]; then
            cd "$artifact" && zip -q "../${artifact}.zip" taskcapsule.exe LICENSE README.md
          else
            tar czf "${artifact}.tar.gz" -C "$artifact" . --transform 's,^\./,taskcapsule/,'
          fi

      - name: Verify archive contents
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            unzip -l taskcapsule_*.zip | grep -q "README.md" && echo "README present" || exit 1
            unzip -l taskcapsule_*.zip | grep -q "LICENSE" && echo "LICENSE present" || exit 1
          else
            tar tzf taskcapsule_*.tar.gz | grep -q "README.md" && echo "README present" || exit 1
            tar tzf taskcapsule_*.tar.gz | grep -q "LICENSE" && echo "LICENSE present" || exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dry-run-${{ matrix.goos }}_${{ matrix.goarch }}
          path: taskcapsule_*.tar.gz taskcapsule_*.zip
